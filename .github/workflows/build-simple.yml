# 简化的多平台编译工作流
# 适用于 fork 仓库快速编译主要平台
name: Build Simple

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ==================== macOS aarch64 (Apple Silicon) ====================
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: |
          rustup update
          rustup target add aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-aarch64

      - name: Install cargo-bundle
        run: |
          cargo install cargo-bundle --git https://github.com/zed-industries/cargo-bundle.git --branch zed-deploy || true

      - name: Set release channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || echo "License generation failed, continuing..."

      - name: Build Zed
        env:
          ZED_BUNDLE: "true"
          CXXFLAGS: "-stdlib=libc++"
        run: |
          cargo build --release --package zed --package cli --target aarch64-apple-darwin
          cargo build --release --package remote_server --target aarch64-apple-darwin

      - name: Create app bundle
        run: |
          cd crates/zed
          cp Cargo.toml Cargo.toml.backup
          sed -i.backup "s/package.metadata.bundle-stable/package.metadata.bundle/" Cargo.toml
          cargo bundle --release --target aarch64-apple-darwin --select-workspace-root || echo "Bundle creation failed, will create manually"
          mv Cargo.toml.backup Cargo.toml
          cd ../..

      - name: Create DMG manually if bundle failed
        run: |
          if [ ! -d "target/aarch64-apple-darwin/release/bundle/osx/Zed.app" ]; then
            echo "Creating app bundle manually..."
            mkdir -p "target/aarch64-apple-darwin/release/bundle/osx/Zed.app/Contents/MacOS"
            mkdir -p "target/aarch64-apple-darwin/release/bundle/osx/Zed.app/Contents/Resources"
            cp target/aarch64-apple-darwin/release/zed "target/aarch64-apple-darwin/release/bundle/osx/Zed.app/Contents/MacOS/zed"
            cp target/aarch64-apple-darwin/release/cli "target/aarch64-apple-darwin/release/bundle/osx/Zed.app/Contents/MacOS/cli"
            cp crates/zed/resources/app-icon.png "target/aarch64-apple-darwin/release/bundle/osx/Zed.app/Contents/Resources/Zed.icns" 2>/dev/null || true
          fi

          # Create DMG
          mkdir -p "target/aarch64-apple-darwin/release/dmg"
          cp -r "target/aarch64-apple-darwin/release/bundle/osx/Zed.app" "target/aarch64-apple-darwin/release/dmg/" 2>/dev/null || true
          ln -sf /Applications "target/aarch64-apple-darwin/release/dmg/Applications"
          hdiutil create -volname Zed -srcfolder "target/aarch64-apple-darwin/release/dmg" -ov -format UDZO "target/Zed-aarch64.dmg" || true

      - name: Package remote_server
        run: |
          if [ -f "target/aarch64-apple-darwin/release/remote_server" ]; then
            gzip -f --stdout --best "target/aarch64-apple-darwin/release/remote_server" > "target/zed-remote-server-macos-aarch64.gz"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-builds
          path: |
            target/*.dmg
            target/*.gz
          if-no-files-found: warn

  # ==================== Linux x86_64 ====================
  linux-x86_64:
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: |
          rustup update
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libwayland-dev \
            wayland-protocols \
            libwayland-egl-backend-dev \
            libxkbcommon-x11-dev \
            libxkbcommon-dev \
            libssl-dev \
            libzstd-dev \
            libvulkan-dev \
            libegl1-mesa-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            clang \
            mold \
            curl \
            git \
            cmake \
            pkg-config

      - name: Set release channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || echo "License generation failed, continuing..."

      - name: Build Zed
        env:
          ZED_BUNDLE: "true"
          RUSTFLAGS: "-C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
        run: |
          cargo build --release --package zed --package cli

      - name: Build remote_server (musl)
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --release --package remote_server --target x86_64-unknown-linux-musl || cargo build --release --package remote_server

      - name: Create tarball
        run: |
          channel=$(cat crates/zed/RELEASE_CHANNEL)
          suffix=""
          [ "$channel" != "stable" ] && suffix="-$channel"

          temp_dir=$(mktemp -d)
          zed_dir="${temp_dir}/zed${suffix}.app"
          mkdir -p "${zed_dir}/bin" "${zed_dir}/libexec" "${zed_dir}/lib"

          cp target/release/zed "${zed_dir}/libexec/zed-editor"
          cp target/release/cli "${zed_dir}/bin/zed"

          # Try to copy libs, but don't fail if some are missing
          ldd target/release/zed 2>/dev/null | grep '=> /' | awk '{print $3}' | grep -v 'libstdc++\|libc.so\|libgcc\|libm.so\|libpthread\|libdl' | head -20 | xargs -I{} cp -v {} "${zed_dir}/lib/" 2>/dev/null || true

          # Icons
          mkdir -p "${zed_dir}/share/icons/hicolor/512x512/apps"
          cp "crates/zed/resources/app-icon${suffix}.png" "${zed_dir}/share/icons/hicolor/512x512/apps/zed.png" 2>/dev/null || true
          cp "crates/zed/resources/app-icon.png" "${zed_dir}/share/icons/hicolor/512x512/apps/zed.png" 2>/dev/null || true

          # Create archive
          arch=$(uname -m)
          tar -czvf "target/zed-linux-${arch}.tar.gz" -C "${temp_dir}" "zed${suffix}.app"

      - name: Package remote_server
        run: |
          if [ -f "target/x86_64-unknown-linux-musl/release/remote_server" ]; then
            gzip -f --stdout --best "target/x86_64-unknown-linux-musl/release/remote_server" > "target/zed-remote-server-linux-x86_64.gz"
          elif [ -f "target/release/remote_server" ]; then
            gzip -f --stdout --best "target/release/remote_server" > "target/zed-remote-server-linux-x86_64.gz"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-builds
          path: |
            target/*.tar.gz
            target/*.gz
          if-no-files-found: warn

  # ==================== Windows x86_64 ====================
  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: |
          rustup update
          rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set release channel
        shell: pwsh
        run: |
          "stable" | Set-Content -Path "crates/zed/RELEASE_CHANNEL"
          "ZED_WORKSPACE=${{ github.workspace }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_VERSION=0.1.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZED_RELEASE_CHANNEL=stable" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate licenses
        shell: pwsh
        run: |
          if (Test-Path "./script/generate-licenses.ps1") {
            . ./script/generate-licenses.ps1 2>&1 | Write-Host
          } else {
            Write-Host "No PowerShell license script found, skipping..."
          }

      - name: Build Zed
        shell: pwsh
        run: |
          $env:ZED_BUNDLE = "true"
          $target = "x86_64-pc-windows-msvc"
          Write-Host "Building zed package for $target..."
          cargo build --release --package zed --package cli --target $target
          Write-Host "Building remote_server package for $target..."
          cargo build --release --package remote_server --target $target

      - name: Package binaries
        shell: pwsh
        run: |
          $outDir = "${{ github.workspace }}\target\release-packages"
          New-Item -Path $outDir -ItemType Directory -Force

          Copy-Item "target\x86_64-pc-windows-msvc\release\zed.exe" -Destination "$outDir\Zed.exe" -ErrorAction SilentlyContinue
          Copy-Item "target\x86_64-pc-windows-msvc\release\cli.exe" -Destination "$outDir\zed-cli.exe" -ErrorAction SilentlyContinue
          Copy-Item "target\x86_64-pc-windows-msvc\release\remote_server.exe" -Destination "$outDir\remote_server.exe" -ErrorAction SilentlyContinue

          # Create main zip
          Compress-Archive -Path "$outDir\*" -DestinationPath "target\Zed-windows-x86_64.zip" -Force -ErrorAction SilentlyContinue

          # Create remote server zip separately
          if (Test-Path "target\x86_64-pc-windows-msvc\release\remote_server.exe") {
            Compress-Archive -Path "target\x86_64-pc-windows-msvc\release\remote_server.exe" -DestinationPath "target\zed-remote-server-windows-x86_64.zip" -Force
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-builds
          path: |
            target/*.zip
          if-no-files-found: warn
