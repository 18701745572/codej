# 简化的多平台编译工作流
# 适用于 fork 仓库快速编译主要平台
name: Build Simple

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # macOS - 构建通用版本 (Universal Binary)
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --git https://github.com/zed-industries/cargo-bundle.git --branch zed-deploy

      - name: Set channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || true

      - name: Build aarch64
        run: |
          export ZED_BUNDLE=true
          export CXXFLAGS="-stdlib=libc++"
          cargo build --release --package zed --package cli --target aarch64-apple-darwin
          cargo build --release --package remote_server --target aarch64-apple-darwin

      - name: Build x86_64
        run: |
          export ZED_BUNDLE=true
          export CXXFLAGS="-stdlib=libc++"
          cargo build --release --package zed --package cli --target x86_64-apple-darwin
          cargo build --release --package remote_server --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/zed \
            target/x86_64-apple-darwin/release/zed \
            -output target/universal-apple-darwin/release/zed
          lipo -create \
            target/aarch64-apple-darwin/release/cli \
            target/x86_64-apple-darwin/release/cli \
            -output target/universal-apple-darwin/release/cli

      - name: Create bundles
        run: |
          # aarch64 bundle
          cd crates/zed
          cp Cargo.toml Cargo.toml.backup
          sed -i.backup "s/package.metadata.bundle-stable/package.metadata.bundle/" Cargo.toml
          cargo bundle --release --target aarch64-apple-darwin --select-workspace-root || true
          cargo bundle --release --target x86_64-apple-darwin --select-workspace-root || true
          mv Cargo.toml.backup Cargo.toml
          cd ../..

      - name: Create DMG
        run: |
          for arch in aarch64 x86_64; do
            if [ -d "target/${arch}-apple-darwin/release/bundle/osx/Zed.app" ]; then
              mkdir -p "target/${arch}-apple-darwin/release/dmg"
              cp -r "target/${arch}-apple-darwin/release/bundle/osx/Zed.app" "target/${arch}-apple-darwin/release/dmg/"
              ln -sf /Applications "target/${arch}-apple-darwin/release/dmg/"
              hdiutil create -volname Zed -srcfolder "target/${arch}-apple-darwin/release/dmg" -ov -format UDZO "target/Zed-${arch}.dmg" || true
            fi
          done

      - name: Package remote_server
        run: |
          for arch in aarch64 x86_64; do
            if [ -f "target/${arch}-apple-darwin/release/remote_server" ]; then
              gzip -f --stdout --best "target/${arch}-apple-darwin/release/remote_server" > "target/zed-remote-server-macos-${arch}.gz"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            target/*.dmg
            target/*.gz
          if-no-files-found: ignore

  # Linux x86_64
  linux:
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            libzstd-dev \
            clang \
            curl \
            git

      - name: Set channel
        run: echo "stable" > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || true

      - name: Build Zed
        env:
          ZED_BUNDLE: "true"
          RUSTFLAGS: "-C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
        run: |
          cargo build --release --package zed --package cli
          cargo build --release --package remote_server

      - name: Create tarball
        run: |
          version=$(cargo metadata --format-version 1 | grep -o '"zed","version":"[^"]*"' | cut -d'"' -f4)
          channel=$(cat crates/zed/RELEASE_CHANNEL)
          suffix=""
          [ "$channel" != "stable" ] && suffix="-$channel"

          temp_dir=$(mktemp -d)
          zed_dir="${temp_dir}/zed${suffix}.app"
          mkdir -p "${zed_dir}/bin" "${zed_dir}/libexec" "${zed_dir}/lib"

          cp target/release/zed "${zed_dir}/libexec/zed-editor"
          cp target/release/cli "${zed_dir}/bin/zed"

          # Copy required libs
          ldd target/release/zed | grep '=> /' | awk '{print $3}' | grep -v 'libstdc++\|libc.so\|libgcc\|libm.so\|libpthread\|libdl' | xargs -I{} cp {} "${zed_dir}/lib/" 2>/dev/null || true

          # Icons
          mkdir -p "${zed_dir}/share/icons/hicolor/512x512/apps"
          cp "crates/zed/resources/app-icon${suffix}.png" "${zed_dir}/share/icons/hicolor/512x512/apps/zed.png" 2>/dev/null || true

          # Create archive
          arch=$(uname -m)
          tar -czvf "target/zed-linux-${arch}.tar.gz" -C "${temp_dir}" "zed${suffix}.app"

          # Remote server
          gzip -f --stdout --best target/release/remote_server > "target/zed-remote-server-linux-${arch}.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            target/*.tar.gz
            target/*.gz
          if-no-files-found: ignore

  # Windows x86_64
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Set release channel
        shell: pwsh
        run: |
          "stable" | Set-Content -Path "crates/zed/RELEASE_CHANNEL"
          "ZED_WORKSPACE=${{ github.workspace }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate licenses
        shell: pwsh
        run: |
          if (Test-Path "./script/generate-licenses.ps1") {
            . ./script/generate-licenses.ps1
          }

      - name: Build Zed
        shell: pwsh
        run: |
          $env:ZED_BUNDLE = "true"
          rustup target add x86_64-pc-windows-msvc
          cargo build --release --package zed --package cli --target x86_64-pc-windows-msvc
          cargo build --release --package remote_server --target x86_64-pc-windows-msvc

      - name: Create installer
        shell: pwsh
        run: |
          # 创建简化版安装程序（不使用原版的复杂签名流程）
          $exeDir = "${{ github.workspace }}\target\release\zed-windows"
          New-Item -Path $exeDir -ItemType Directory -Force

          Copy-Item "target\x86_64-pc-windows-msvc\release\zed.exe" -Destination "$exeDir\Zed.exe"
          Copy-Item "target\x86_64-pc-windows-msvc\release\cli.exe" -Destination "$exeDir\zed.exe"
          Copy-Item "target\x86_64-pc-windows-msvc\release\remote_server.exe" -Destination "$exeDir\remote_server.exe"

          # 创建 zip
          Compress-Archive -Path "$exeDir\*" -DestinationPath "target\Zed-windows-x86_64.zip" -Force

      - name: Package remote_server
        shell: pwsh
        run: |
          Compress-Archive -Path "target\x86_64-pc-windows-msvc\release\remote_server.exe" -DestinationPath "target\zed-remote-server-windows-x86_64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            target/*.zip
          if-no-files-found: ignore
