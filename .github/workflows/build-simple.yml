# 简化的多平台编译工作流
name: Build Simple

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --git https://github.com/zed-industries/cargo-bundle.git --branch zed-deploy || true

      - name: Set channel
        run: echo stable > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || echo License generation failed

      - name: Build Zed
        env:
          ZED_BUNDLE: "true"
          CXXFLAGS: "-stdlib=libc++"
        run: cargo build --release --package zed --package cli --target aarch64-apple-darwin

      - name: Build remote_server
        run: cargo build --release --package remote_server --target aarch64-apple-darwin

      - name: Create bundle
        run: |
          cd crates/zed
          cp Cargo.toml Cargo.toml.backup
          sed -i.backup 's/package.metadata.bundle-stable/package.metadata.bundle/' Cargo.toml
          cargo bundle --release --target aarch64-apple-darwin --select-workspace-root || echo Bundle failed
          mv Cargo.toml.backup Cargo.toml

      - name: Create DMG
        run: |
          mkdir -p target/aarch64-apple-darwin/release/dmg
          cp -r target/aarch64-apple-darwin/release/bundle/osx/Zed.app target/aarch64-apple-darwin/release/dmg/ 2>/dev/null || echo No bundle found
          ln -sf /Applications target/aarch64-apple-darwin/release/dmg/Applications
          hdiutil create -volname Zed -srcfolder target/aarch64-apple-darwin/release/dmg -ov -format UDZO target/Zed-aarch64.dmg || echo DMG creation failed

      - name: Package remote_server
        run: gzip -c target/aarch64-apple-darwin/release/remote_server > target/zed-remote-server-macos-aarch64.gz || echo No remote_server

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: target/*.dmg
          if-no-files-found: warn

  linux-x86_64:
    runs-on: ubuntu-22.04
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfontconfig1-dev libwayland-dev libxkbcommon-x11-dev libssl-dev libzstd-dev libvulkan-dev clang mold git cmake pkg-config

      - name: Set channel
        run: echo stable > crates/zed/RELEASE_CHANNEL

      - name: Generate licenses
        run: ./script/generate-licenses || echo License generation failed

      - name: Build Zed
        env:
          ZED_BUNDLE: "true"
          RUSTFLAGS: "-C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
        run: cargo build --release --package zed --package cli

      - name: Build remote_server
        run: cargo build --release --package remote_server

      - name: Create tarball
        run: |
          temp_dir=$(mktemp -d)
          mkdir -p "${temp_dir}/zed.app/bin" "${temp_dir}/zed.app/libexec"
          cp target/release/zed "${temp_dir}/zed.app/libexec/zed-editor"
          cp target/release/cli "${temp_dir}/zed.app/bin/zed"
          tar -czvf target/zed-linux-x86_64.tar.gz -C "${temp_dir}" zed.app

      - name: Package remote_server
        run: gzip -c target/release/remote_server > target/zed-remote-server-linux-x86_64.gz

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            target/*.tar.gz
            target/*.gz
          if-no-files-found: warn

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set channel
        shell: pwsh
        run: |
          "stable" | Set-Content crates/zed/RELEASE_CHANNEL
          "ZED_WORKSPACE=${{ github.workspace }}" | Out-File $env:GITHUB_ENV -Append

      - name: Generate licenses
        shell: pwsh
        run: if (Test-Path ./script/generate-licenses.ps1) { . ./script/generate-licenses.ps1 }

      - name: Build Zed
        shell: pwsh
        run: |
          $env:ZED_BUNDLE = "true"
          cargo build --release --package zed --package cli --target x86_64-pc-windows-msvc
          cargo build --release --package remote_server --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $out = "${{ github.workspace }}\target\release-packages"
          New-Item -Path $out -ItemType Directory -Force
          Copy-Item "target\x86_64-pc-windows-msvc\release\zed.exe" "$out\" -ErrorAction SilentlyContinue
          Copy-Item "target\x86_64-pc-windows-msvc\release\cli.exe" "$out\zed-cli.exe" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$out\*" "target\Zed-windows-x86_64.zip" -Force
          Compress-Archive -Path "target\x86_64-pc-windows-msvc\release\remote_server.exe" "target\zed-remote-server-windows-x86_64.zip" -Force

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: target/*.zip
          if-no-files-found: warn
